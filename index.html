<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini 협업 수학 시뮬레이터</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <style>
        * { box-sizing: border-box; }

        :root { 
            --gemini-blue: #1A73E8; 
            --gemini-purple: #8E75FF; 
            --bg: #F8FAFD; 
            --card: #FFFFFF;
            --gradient: linear-gradient(45deg, #4285F4, #9B72CB, #D96570);
        }
        
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .view-section { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .view-active { display: flex; }

        /* --- 시작 화면 (Intro View) --- */
        .intro-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 8vh; position: relative; }
        
        .title-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; margin-bottom: 30px; }
        .brand-line { display: flex; align-items: center; gap: 15px; }
        .intro-logo { width: 75px; height: 75px; animation: pulse 3s infinite ease-in-out; }
        .intro-title-brand { font-size: 3.6rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin: 0; letter-spacing: -1.5px; }
        .intro-title-main { font-size: 3.2rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin: 0; letter-spacing: -1px; }
        
        .intro-subtitle { font-size: 1.3rem; color: #5F6368; font-weight: 700; background: #EEF3FF; padding: 10px 25px; border-radius: 20px; border: 1px solid #D2E3FC; margin-top: 20px; margin-bottom: 40px; }

        .grade-group { display: flex; gap: 15px; width: 100%; max-width: 800px; justify-content: center; }
        .grade-btn { flex: 1; height: 65px; background: #FFFFFF; border: 2px solid #E3E8EF; color: #5F6368; border-radius: 14px; font-size: 1.2rem; font-weight: 800; cursor: pointer; transition: all 0.2s; }
        .grade-btn:hover { border-color: var(--gemini-blue); color: var(--gemini-blue); background: #F8FAFD; }
        .grade-btn.active { background: var(--gemini-blue); border-color: var(--gemini-blue); color: white; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3); }

        .chapter-group-wrapper { position: relative; min-height: 120px; width: 100%; max-width: 1200px; display: flex; flex-direction: column; align-items: center; margin-top: 40px; margin-bottom: 20px; }
        #tree-svg { position: absolute; top: -35px; left: 0; width: 100%; height: 35px; pointer-events: none; overflow: visible; }
        
        .chapter-group { display: flex; gap: 10px; flex-wrap: nowrap; justify-content: center; width: auto; position: relative; z-index: 2; }
        .chapter-btn { background: #FFFFFF; border: 2px solid #E3E8EF; color: #5F6368; padding: 12px 18px; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; }
        .chapter-btn:hover { border-color: var(--gemini-blue); color: var(--gemini-blue); }
        .chapter-btn.active { background: #EEF3FF; border-color: var(--gemini-blue); color: var(--gemini-blue); font-weight: 800; }

        .start-btn { background: var(--gemini-blue); color: white; padding: 18px 65px; border-radius: 18px; font-size: 1.5rem; font-weight: 800; border: none; cursor: pointer; transition: all 0.3s; margin-top: 10px; }
        .start-btn:disabled { background: #DADCE0; color: #9AA0A6; cursor: not-allowed; opacity: 0.7; }

        .author-footer { position: absolute; bottom: 30px; right: 40px; text-align: right; font-size: 1.15rem; color: #5F6368; font-weight: 600; line-height: 1.5; }

        /* --- 메인 시뮬레이터 (Main View) --- */
        #hidden-reset { position: absolute; top: 0; right: 0; width: 50px; height: 50px; background: transparent; border: 1px solid transparent; cursor: pointer; z-index: 100; transition: border 0.2s; }
        #hidden-reset:hover { border: 1px solid rgba(0, 0, 0, 0.15); border-radius: 8px; }

        .header { display: flex; width: 100%; height: 60px; margin-bottom: 15px; flex-shrink: 0; align-items: center; }
        .header-left { flex: 1; display: flex; align-items: center; gap: 12px; }
        .header-right { flex: 1; display: flex; justify-content: center; align-items: center; }

        .gemini-text-main { font-size: 2.2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; letter-spacing: -1px; }
        .separator { font-size: 1.8rem; color: #DADCE0; margin: 0 10px; }
        .sub-text-header { font-size: 1.5rem; color: #5F6368; font-weight: 500; }

        .timer-container { background: #E8F0FE; padding: 6px 25px; border-radius: 12px; border: 2px solid var(--gemini-blue); min-width: 120px; text-align: center; }
        #timer { font-size: 1.6rem; font-weight: 800; color: var(--gemini-blue); }

        .container { display: flex; flex: 1; gap: 20px; min-height: 0; overflow: hidden; }
        .left-col, .right-col { flex: 1; display: flex; flex-direction: column; gap: 15px; min-height: 0; min-width: 0; }

        .section-card { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); border: 1px solid #E3E8EF; display: flex; flex-direction: column; position: relative; overflow: hidden; height: 100%; }
        
        .prob-area { flex: 0 0 28%; justify-content: flex-start; }
        .hint-area { flex: 1; min-height: 0; }

        .label-box { display: inline-block; background: #EEF3FF; color: var(--gemini-blue); padding: 6px 15px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; border: 1px solid #D2E3FC; width: fit-content; flex-shrink: 0; }
        .hint-label { display: inline-block; padding: 4px 12px; border-radius: 6px; background: var(--gradient); color: white; font-weight: 700; font-size: 0.9rem; margin-bottom: 8px; }

        .math-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        .math-main { font-size: clamp(1.4rem, 2.8vw, 2.6rem) !important; font-weight: 900; color: #000000 !important; margin: 0; text-align: center; }
        
        .placeholder-text { font-size: 1.3rem; color: #9AA0A6; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .trigger-btn { background: var(--gemini-blue); color: white; padding: 8px 16px; border-radius: 8px; font-weight: 700; font-size: 1.1rem; }

        .hint-item { padding: 15px; border-radius: 12px; background: #F8F9FA; border: 1px solid #E9ECEF; display: none; animation: fadeIn 0.4s ease; margin-bottom: 10px; }
        .hint-text { font-size: 1.2rem; color: #3C4043; line-height: 1.5; font-weight: 500; word-break: keep-all; overflow-wrap: break-word; }

        .ai-area { border: 2px solid #D2E3FC; }
        .ai-loading-container { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }
        .loader-wrapper { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
        
        .c-ring { 
            position: absolute; width: 100%; height: 100%; 
            animation: spin 1s linear infinite;
        }
        .diamond-img { width: 70px; height: 70px; z-index: 2; animation: pulse 2s infinite ease-in-out; }

        .loading-ment { font-size: 2rem; font-weight: 800; color: var(--gemini-blue); text-align: center; }

        .sol-content { display: none; flex-direction: column; height: 100%; overflow: hidden; padding-top: 10px; }
        
        .synth-table { margin: 8px auto; border-collapse: collapse; font-size: 1.5rem; }
        .synth-table td { padding: 4px 16px; text-align: center; }
        .synth-border-left { border-left: 3px solid #5F6368; }
        .synth-border-bottom { border-bottom: 3px solid #5F6368; }
        .remainder { color: #D93025; font-weight: bold; border: 2px solid #FAD2CF; border-radius: 8px; }

        /* 정답 영역 수식 폰트 크기 미세 조정 */
        .final-ans { background: #E8F0FE; padding: 12px; border-radius: 12px; font-size: 1.7rem; font-weight: 900; color: #1967D2; text-align: center; margin-top: auto; margin-bottom: 5px; border: 1px solid #D2E3FC; flex-shrink: 0; }
        .final-ans .katex { font-size: 0.85em; } /* 분수 높이 고려하여 85% 크기로 축소 */

        .controls { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; background: #202124; padding: 10px; border-radius: 15px; flex-shrink: 0; }
        .ctrl-btn { padding: 10px 5px; font-size: 0.9rem; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-blue { background: var(--gemini-blue); color: white; }
        .btn-gray { background: #5F6368; color: white; }
        .btn-green { background: #34A853; color: white; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<svg style="display:none;">
    <symbol id="gemini-diamond" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="url(#grad1)"/>
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#9B72CB;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#D96570;stop-opacity:1" />
            </linearGradient>
        </defs>
    </symbol>
</svg>

<div id="intro-view" class="view-section view-active">
    <div class="intro-container">
        <div class="title-wrapper">
            <div class="brand-line">
                <img src="gemini-color.png" class="intro-logo" alt="Gemini Logo">
                <span class="intro-title-brand">Gemini</span>
            </div>
            <h1 class="intro-title-main">AI 협업 수학 시뮬레이터</h1>
        </div>
        <div class="intro-subtitle">2022 개정 수학과 교육과정</div>
        <div class="grade-group">
            <button class="grade-btn" onclick="selectGrade('g1', this)">고1 공통수학</button>
            <button class="grade-btn" onclick="selectGrade('g2', this)">고2 대수/미적분I</button>
            <button class="grade-btn" onclick="selectGrade('g3', this)">고3 미적분II/확통/기하</button>
        </div>
        <div class="chapter-group-wrapper" id="chapter-wrapper">
            <svg id="tree-svg"></svg>
            <div id="chapter-container" class="chapter-group"></div>
        </div>
        <button id="start-app-btn" class="start-btn" disabled onclick="initSimulator()">시뮬레이터 시작하기</button>
        <div class="author-footer">수학교교육과 20200522<br>이상진</div>
    </div>
</div>

<div id="main-view" class="view-section">
    <button id="hidden-reset" onclick="resetDatabase()" title="초기화"></button>
    <div class="header">
        <div class="header-left">
            <img src="gemini-color.png" width="40" height="40" alt="logo">
            <span class="gemini-text-main">Gemini</span>
            <span class="separator">|</span>
            <span class="sub-text-header">AI 협업 수학 시뮬레이터 : 조립제법</span>
        </div>
        <div class="header-right">
            <div class="timer-container"><div id="timer">05:00</div></div>
        </div>
    </div>

    <div class="container">
        <div class="left-col">
            <div class="section-card prob-area">
                <div class="label-box">탐구 과제 : 조립제법을 이용한 고차방정식의 해 구하기</div>
                <div id="prob-loading" style="display:none; flex:1; align-items:center; justify-content:center; flex-direction:column;">
                    <div class="loader-wrapper" style="width:45px; height:45px;">
                        <svg class="c-ring" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="origGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#9B72CB;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#D96570;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path d="M 78.28 78.28 A 40 40 0 1 1 78.28 21.72" fill="none" stroke="url(#origGrad1)" stroke-width="8" stroke-linecap="round"/>
                        </svg>
                    </div>
                </div>
                <div class="math-container">
                    <div id="math-display" class="placeholder-text">하단의 <span class="trigger-btn">🎲 문제 생성</span> 버튼을 클릭하세요.</div>
                </div>
            </div>
            <div class="section-card hint-area">
                <div class="label-box">AI Scaffolding</div>
                <div id="hint-1" class="hint-item">
                    <div class="hint-label">Step 1: 탐색 전략</div>
                    <div class="hint-text" id="h1-text"></div>
                </div>
                <div id="hint-2" class="hint-item">
                    <div class="hint-label">Step 2: 실행 가이드</div>
                    <div class="hint-text" id="h2-text"></div>
                </div>
            </div>
            <div class="controls">
                <button class="ctrl-btn btn-blue" id="gen-btn" onclick="fetchProblemData()">🎲 문제 생성</button>
                <button class="ctrl-btn btn-gray" id="timer-btn" onclick="toggleTimer()">⏳ 타이머</button>
                <button class="ctrl-btn btn-gray" id="h1-btn" onclick="revealScaffolding(1)" disabled>💡 힌트 1</button>
                <button class="ctrl-btn btn-gray" id="h2-btn" onclick="revealScaffolding(2)" disabled>💡 힌트 2</button>
                <button class="ctrl-btn btn-blue" id="solve-btn" onclick="processAIAnalysis()" disabled>✨ AI 풀이</button>
                <button class="ctrl-btn btn-green" id="next-btn" onclick="resetWorkspace()">⮕ 다음문제</button>
            </div>
        </div>
        <div class="right-col">
            <div class="section-card ai-area">
                <div style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 10px;">
                    <div class="label-box" style="margin: 0;">AI 풀이 결과</div>
                    <span id="ai-sol-label" style="position: absolute; left: 0; color:var(--gemini-blue); font-weight:800; font-size:1.1rem; display:none;">상세 사고 과정 분석</span>
                </div>
                <div id="ai-loading" class="ai-loading-container">
                    <div class="loader-wrapper">
                        <svg class="c-ring" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                            <defs>
                                <linearGradient id="origGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                                    <stop offset="50%" style="stop-color:#9B72CB;stop-opacity:1" />
                                    <stop offset="100%" style="stop-color:#D96570;stop-opacity:1" />
                                </linearGradient>
                            </defs>
                            <path d="M 78.28 78.28 A 40 40 0 1 1 78.28 21.72" fill="none" stroke="url(#origGrad2)" stroke-width="8" stroke-linecap="round"/>
                        </svg>
                        <img src="gemini-color.png" class="diamond-img" alt="gemini">
                    </div>
                    <div id="ai-ment" class="loading-ment">수학적 구조 분석 중...</div>
                </div>
                <div id="sol-view" class="sol-content">
                    <div id="sol-stream" style="font-size:1.1rem; line-height:1.6; padding: 0 5px;"></div>
                    <div id="sol-footer" class="final-ans" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    const curriculumData = {
        'g1': ["다항식", "방정식과 부등식", "경우의 수", "행렬", "도형의 방정식", "집합과 명제", "함수와 그래프"],
        'g2': ["지수함수와 로그함수", "삼각함수", "수열", "함수의 극한과 연속", "미분", "적분"],
        'g3': ["수열의 극한", "미분법", "적분법", "경우의 수", "확률", "통계", "이차곡선", "공간도형과 공간좌표", "벡터"]
    };

    const problemDatabase = [
        { id: 1, q: "x^3 - 6x^2 + 11x - 6 = 0", h1: "인수정리를 위해 계수들의 총합을 구해보세요. 총합이 0인 경우 어떤 값이 근이 될까요?", h2: "$x=1$을 대입하면 성립합니다. 1을 기준으로 조립제법을 시작하세요.", k: 1, coeffs: [1, -6, 11, -6], mid: ["", 1, -5, 6], res: [1, -5, 6, 0], factor: "(x^2 - 5x + 6)", factorFinal: "(x-2)(x-3)", ans: "x = 1, 2, 3" },
        { id: 2, q: "2x^3 - 5x^2 + x + 2 = 0", h1: "상수항($2$)의 약수를 최고차항($2$)의 약수로 나눈 후보($\\pm 1, \\pm 2, \\pm 1/2$)를 대입해 보세요.", h2: "$x=2$를 대입하면 식이 성립합니다. 2로 조립제법을 수행하세요.", k: 2, coeffs: [2, -5, 1, 2], mid: ["", 4, -2, -2], res: [2, -1, -1, 0], factor: "(2x^2 - x - 1)", factorFinal: "(2x+1)(x-1)", ans: "x = 2, 1, -\\frac{1}{2}" },
        { id: 3, q: "x^3 - 3x + 2 = 0", h1: "이차항이 생략된 경우입니다. 계수의 합을 구하여 간단한 정수근이 존재하는지 확인하세요.", h2: "이차항 자리에 0을 쓰고 $x=1$로 조립제법을 진행합니다.", k: 1, coeffs: [1, 0, -3, 2], mid: ["", 1, 1, -2], res: [1, 1, -2, 0], factor: "(x^2 + x - 2)", factorFinal: "(x+2)(x-1)", ans: "x = 1(\\text{중근}), -2" },
        { id: 4, q: "3x^3 - 2x^2 - 7x - 2 = 0", h1: "유리수 근 정리를 떠올려 보세요. 상수항이 $-2$이므로 대입할 만한 정수와 분수 후보를 추려보세요.", h2: "$x=2$일 때 식이 0이 됩니다. $x=2$로 조립제법을 실행하세요.", k: 2, coeffs: [3, -2, -7, -2], mid: ["", 6, 8, 2], res: [3, 4, 1, 0], factor: "(3x^2 + 4x + 1)", factorFinal: "(3x+1)(x+1)", ans: "x = 2, -1, -\\frac{1}{3}" },
        { id: 5, q: "x^3 - x^2 - 4x + 4 = 0", h1: "다항식 $P(x)$에 $1$이나 $-1$을 대입하여 인수정리가 성립하는지 먼저 확인하세요.", h2: "$x=1$로 조립제법을 수행하면 나머지가 0이 됩니다.", k: 1, coeffs: [1, -1, -4, 4], mid: ["", 1, 0, -4], res: [1, 0, -4, 0], factor: "(x^2 - 4)", factorFinal: "(x-2)(x+2)", ans: "x = 1, 2, -2" },
        { id: 6, q: "4x^3 - 8x^2 - x + 2 = 0", h1: "최고차항 계수가 4입니다. 상수항의 약수 중에서 근을 찾아보고 정수가 없다면 분수를 고려하세요.", h2: "$x=2$를 대입하면 식이 성립합니다. 2를 제수로 조립제법 하세요.", k: 2, coeffs: [4, -8, -1, 2], mid: ["", 8, 0, -2], res: [4, 0, -1, 0], factor: "(4x^2 - 1)", factorFinal: "(2x-1)(2x+1)", ans: "x = 2, \\frac{1}{2}, -\\frac{1}{2}" },
        { id: 7, q: "x^3 - 7x - 6 = 0", h1: "이차항 계수가 0일 때의 조립제법 배치에 주의하세요. 상수항 $-6$의 음의 약수 중 근을 찾아보세요.", h2: "$x=-1$을 대입하면 성립합니다. $-1$로 조립제법을 시작합니다.", k: -1, coeffs: [1, 0, -7, -6], mid: ["", -1, 1, 6], res: [1, -1, -6, 0], factor: "(x^2 - x - 6)", factorFinal: "(x-3)(x+2)", ans: "x = -1, 3, -2" },

    ];

    let problemHistory = new Set();
    let activeProblem = null;
    let activePreviousProblem = null;
    let timerInstance = null;
    let timeRemaining = 300;

    function selectGrade(gradeKey, btnElement) {
        document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        selectedGrade = gradeKey;
        selectedChapter = null;
        updateStartButton();
        const container = document.getElementById('chapter-container');
        container.innerHTML = '';
        curriculumData[gradeKey].forEach(chapter => {
            const btn = document.createElement('button');
            btn.className = 'chapter-btn';
            btn.innerText = chapter;
            btn.onclick = () => selectChapter(chapter, btn);
            container.appendChild(btn);
        });
        requestAnimationFrame(() => drawTreeLine(btnElement));
    }

    function selectChapter(chapterName, btnElement) {
        document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        selectedChapter = chapterName;
        updateStartButton();
    }

    function updateStartButton() {
        const startBtn = document.getElementById('start-app-btn');
        startBtn.disabled = !(selectedGrade && selectedChapter);
    }

    function drawTreeLine(activeGradeBtn) {
        const svg = document.getElementById('tree-svg');
        const chapters = document.querySelectorAll('.chapter-btn');
        if (!activeGradeBtn || chapters.length === 0) return;
        svg.innerHTML = '';
        const svgRect = svg.getBoundingClientRect();
        const gradeRect = activeGradeBtn.getBoundingClientRect();
        const startX = gradeRect.left + gradeRect.width / 2 - svgRect.left;
        const firstRect = chapters[0].getBoundingClientRect();
        const lastRect = chapters[chapters.length - 1].getBoundingClientRect();
        const minX = firstRect.left + firstRect.width / 2 - svgRect.left;
        const maxX = lastRect.left + lastRect.width / 2 - svgRect.left;
        const lineMinX = Math.min(minX, startX);
        const lineMaxX = Math.max(maxX, startX);
        let pathData = `M ${startX} 0 L ${startX} 18 M ${lineMinX} 18 L ${lineMaxX} 18 `;
        chapters.forEach(ch => {
            const r = ch.getBoundingClientRect();
            const cx = r.left + r.width / 2 - svgRect.left;
            pathData += `M ${cx} 18 L ${cx} 35 `;
        });
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('stroke', '#1A73E8');
        path.setAttribute('stroke-width', '2.5');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
    }

    function initSimulator() {
        document.getElementById('intro-view').classList.remove('view-active');
        document.getElementById('main-view').classList.add('view-active');
        renderMath();
    }

    function renderMath() {
        renderMathInElement(document.body, {
            delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}],
            throwOnError: false
        });
    }

    function resetDatabase() {
        problemHistory.clear();
        activePreviousProblem = null;
        resetWorkspace();
    }

    function fetchProblemData() {
        const displayArea = document.getElementById('math-display');
        const loaderArea = document.getElementById('prob-loading');
        loaderArea.style.display = 'flex'; displayArea.style.display = 'none';
        setTimeout(() => {
            let availableData = problemDatabase.filter(p => !problemHistory.has(p.id));
            if (availableData.length === 0) {
                activeProblem = activePreviousProblem ? activePreviousProblem : problemDatabase[problemDatabase.length - 1];
            } else {
                activeProblem = availableData[Math.floor(Math.random() * availableData.length)];
                problemHistory.add(activeProblem.id);
                activePreviousProblem = activeProblem;
            }
            loaderArea.style.display = 'none'; displayArea.style.display = 'flex';
            displayArea.className = "math-main";
            displayArea.innerText = "$$" + activeProblem.q + "$$";
            document.getElementById('h1-text').innerText = activeProblem.h1;
            document.getElementById('h2-text').innerText = activeProblem.h2;
            document.getElementById('h1-btn').disabled = false;
            document.getElementById('h2-btn').disabled = false;
            document.getElementById('solve-btn').disabled = false;
            renderMath();
        }, 4500);
    }

    function toggleTimer() {
        const btn = document.getElementById('timer-btn');
        if (timerInstance) {
            clearInterval(timerInstance);
            timerInstance = null;
            btn.innerText = "⏳ 재개";
        } else {
            btn.innerText = "⏹️ 중지";
            timerInstance = setInterval(() => {
                if (timeRemaining > 0) {
                    timeRemaining--;
                    updateTimerUI();
                } else {
                    clearInterval(timerInstance);
                    timerInstance = null;
                    btn.innerText = "⏳ 타이머";
                }
            }, 1000);
        }
    }

    function updateTimerUI() {
        const min = Math.floor(timeRemaining / 60); const sec = timeRemaining % 60;
        document.getElementById('timer').innerText = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
    }

    function revealScaffolding(n) { document.getElementById(`hint-${n}`).style.display = 'block'; }

    function processAIAnalysis() {
        if(timerInstance) { clearInterval(timerInstance); timerInstance = null; document.getElementById('timer-btn').innerText = "⏳ 타이머"; }
        document.getElementById('sol-view').style.display = 'none';
        document.getElementById('ai-sol-label').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'flex';
        const processSteps = ["방정식 차수 분석 중...", "계수 추출 및 행렬 구성 중...", "조립제법 알고리즘 연산 중..."];
        let stepIdx = 0;
        const processTimer = setInterval(() => {
            document.getElementById('ai-ment').innerText = processSteps[stepIdx % 3];
            stepIdx++;
        }, 2000);
        setTimeout(() => {
            clearInterval(processTimer);
            document.getElementById('ai-loading').style.display = 'none';
            document.getElementById('ai-sol-label').style.display = 'block';
            document.getElementById('sol-view').style.display = 'flex';
            renderAIResponse();
        }, 7000);
    }

    function renderAIResponse() {
        const target = document.getElementById('sol-stream');
        const footer = document.getElementById('sol-footer');
        target.innerHTML = ""; footer.style.display = "none";

        const tableHTML = `
            <div style="margin: 10px 0; display:flex; justify-content:center;">
                <table class="synth-table">
                    <tr>
                        <td style="color:var(--gemini-blue); font-weight:bold;">${activeProblem.k}</td>
                        <td class="synth-border-left">${activeProblem.coeffs[0]}</td>
                        <td>${activeProblem.coeffs[1]}</td>
                        <td>${activeProblem.coeffs[2]}</td>
                        <td>${activeProblem.coeffs[3]}</td>
                    </tr>
                    <tr><td></td><td class="synth-border-left"></td><td style="color:#8E75FF;">${activeProblem.mid[1]}</td><td style="color:#8E75FF;">${activeProblem.mid[2]}</td><td style="color:#8E75FF;">${activeProblem.mid[3]}</td></tr>
                    <tr class="synth-border-bottom"><td colspan="5" style="height:0; padding:0;"></td></tr>
                    <tr><td></td><td>${activeProblem.res[0]}</td><td>${activeProblem.res[1]}</td><td>${activeProblem.res[2]}</td><td class="remainder">${activeProblem.res[3]}</td></tr>
                </table>
            </div>
        `;

        const signK = activeProblem.k < 0 ? '+' : '-';
        const absK = Math.abs(activeProblem.k);
        const factorStr = `(x ${signK} ${absK})`;

        const analysisData = [
            `<b>1. 인수정리:</b> $P(${activeProblem.k}) = 0$임을 확인하여 일차인수 $${factorStr}$를 추출합니다.`,
            `<b>2. 조립제법 실행:</b> 식의 계수 $[${activeProblem.coeffs.join(', ')}]$을 사용하여 나눗셈을 수행합니다.`,
            tableHTML,
            `<b>3. 1차 인수분해 결과:</b> 조립제법을 통해 다항식을 다음과 같이 1차 분해합니다. <br> &nbsp;&nbsp; $\\Rightarrow ${factorStr}${activeProblem.factor} = 0$`,
            `<b>4. 2차 인수분해 결과:</b> 몫으로 남은 이차식을 한 번 더 인수분해합니다. <br> &nbsp;&nbsp; $\\Rightarrow ${factorStr}${activeProblem.factorFinal} = 0$`,
            `<b>5. 근의 도출:</b> 각 인수가 0이 되게 하는 모든 실근을 산출합니다.`
        ];

        let index = 0;
        function renderStep() {
            if (index < analysisData.length) {
                const div = document.createElement('div');
                div.style.marginBottom = "10px"; div.style.opacity = "0";
                div.innerHTML = analysisData[index];
                target.appendChild(div);
                setTimeout(() => { div.style.transition = "opacity 0.6s"; div.style.opacity = "1"; renderMath(); }, 50);
                index++;
                setTimeout(renderStep, 1000);
            } else {
                footer.style.display = "block";
                footer.innerHTML = "정답 : $ " + activeProblem.ans + " $";
                renderMath();
            }
        }
        renderStep();
    }

    function resetWorkspace() {
        const mathDisplay = document.getElementById('math-display');
        mathDisplay.innerHTML = "하단의 <span class='trigger-btn'>🎲 문제 생성</span> 버튼을 클릭하세요.";
        mathDisplay.className = "placeholder-text";
        document.getElementById('hint-1').style.display = 'none';
        document.getElementById('hint-2').style.display = 'none';
        document.getElementById('sol-view').style.display = 'none';
        document.getElementById('ai-sol-label').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('h1-btn').disabled = true;
        document.getElementById('h2-btn').disabled = true;
        document.getElementById('solve-btn').disabled = true;
        timeRemaining = 300; updateTimerUI();
    }

    window.onload = renderMath;
</script>

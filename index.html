<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Gemini 협업 수학 시뮬레이터</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.css">
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/katex.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.8/dist/contrib/auto-render.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">

    <style>
        * { box-sizing: border-box; }

        :root { 
            --gemini-blue: #1A73E8; 
            --gemini-purple: #8E75FF; 
            --bg: #F8FAFD; 
            --card: #FFFFFF;
            --gradient: linear-gradient(45deg, #4285F4, #9B72CB, #D96570);
        }
        
        body { font-family: 'Pretendard', sans-serif; background: var(--bg); margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .view-section { display: none; flex-direction: column; height: 100%; width: 100%; position: relative; }
        .view-active { display: flex; }

        /* --- 시작 화면 (Intro View) --- */
        .intro-container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; padding-top: 15vh; position: relative; padding-bottom: 80px; }
        
        .title-wrapper { display: flex; align-items: center; justify-content: center; gap: 15px; margin-bottom: 5px; }
        .intro-logo { width: 60px; height: 60px; animation: pulse 3s infinite ease-in-out; }
        .intro-title-brand { font-size: 3rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin: 0; letter-spacing: -1px; }
        
        .intro-title-main { font-size: 2.8rem; font-weight: 900; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; margin: 0; letter-spacing: -1px; }
        
        .intro-subtitle { font-size: 1.2rem; color: #5F6368; font-weight: 700; background: #EEF3FF; padding: 8px 20px; border-radius: 20px; border: 1px solid #D2E3FC; margin-top: 40px; margin-bottom: 50px; }

        .grade-group { display: flex; gap: 15px; margin-bottom: 0; width: 100%; max-width: 750px; justify-content: center; }
        .grade-btn { flex: 1; max-width: 220px; background: #FFFFFF; border: 2px solid #E3E8EF; color: #5F6368; padding: 14px; border-radius: 12px; font-size: 1.15rem; font-weight: 800; cursor: pointer; transition: all 0.2s; position: relative; }
        .grade-btn:hover { border-color: var(--gemini-blue); color: var(--gemini-blue); background: #F8FAFD; }
        .grade-btn.active { background: var(--gemini-blue); border-color: var(--gemini-blue); color: white; box-shadow: 0 4px 15px rgba(26, 115, 232, 0.3); }

        .chapter-group-wrapper { position: relative; min-height: 120px; width: 100%; max-width: 900px; display: flex; flex-direction: column; align-items: center; margin-top: 40px; margin-bottom: 40px; }
        #tree-svg { position: absolute; top: -30px; left: 0; width: 100%; height: 30px; pointer-events: none; overflow: visible; }
        
        .chapter-group { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; width: 100%; position: relative; z-index: 2; }
        .chapter-btn { background: #FFFFFF; border: 2px solid #E3E8EF; color: #5F6368; padding: 12px 20px; border-radius: 10px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.2s; }
        .chapter-btn:hover { border-color: var(--gemini-blue); color: var(--gemini-blue); }
        .chapter-btn.active { background: #EEF3FF; border-color: var(--gemini-blue); color: var(--gemini-blue); font-weight: 800; box-shadow: 0 2px 10px rgba(26, 115, 232, 0.15); }

        .start-btn { background: var(--gemini-blue); color: white; padding: 18px 50px; border-radius: 15px; font-size: 1.4rem; font-weight: 800; border: none; cursor: pointer; transition: all 0.3s; box-shadow: 0 8px 20px rgba(26, 115, 232, 0.3); z-index: 5; }
        .start-btn:disabled { background: #DADCE0; color: #9AA0A6; box-shadow: none; cursor: not-allowed; transform: none !important; }
        .start-btn:hover:not(:disabled) { transform: translateY(-3px); filter: brightness(1.1); }

        .author-footer { position: absolute; bottom: 20px; right: 20px; text-align: right; font-size: 1.1rem; color: #5F6368; font-weight: 600; line-height: 1.4; z-index: 1; }

        /* --- 메인 시뮬레이터 (Main View) --- */
        #hidden-reset { position: absolute; top: 0; right: 0; width: 40px; height: 40px; background: transparent; border: 1px solid transparent; cursor: pointer; border-radius: 6px; z-index: 100; transition: border 0.2s; }
        #hidden-reset:hover { border: 1px solid rgba(0, 0, 0, 0.15); }

        .header { display: flex; width: 100%; height: 60px; margin-bottom: 15px; flex-shrink: 0; align-items: center; position: relative; }
        .header-left { width: 50%; display: flex; align-items: center; gap: 12px; }
        .header-right { width: 50%; display: flex; justify-content: center; align-items: center; }

        .gemini-text { font-size: 2rem; font-weight: 800; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; color: transparent; letter-spacing: -1px; }
        .separator { font-size: 1.8rem; color: #DADCE0; margin: 0 10px; font-weight: 300; }
        .sub-text { font-size: 1.5rem; color: #5F6368; font-weight: 500; }

        .timer-container { background: #E8F0FE; padding: 6px 20px; border-radius: 12px; border: 2px solid var(--gemini-blue); min-width: 100px; text-align: center; }
        #timer { font-size: 1.5rem; font-weight: 800; color: var(--gemini-blue); font-variant-numeric: tabular-nums; }

        .container { display: flex; flex: 1; gap: 20px; min-height: 0; overflow: hidden; }
        .left-col { flex: 1; display: flex; flex-direction: column; gap: 15px; min-height: 0; }
        .right-col { flex: 1; display: flex; flex-direction: column; min-height: 0; }

        .section-card { background: var(--card); border-radius: 24px; padding: 25px; box-shadow: 0 8px 30px rgba(0,0,0,0.03); border: 1px solid #E3E8EF; display: flex; flex-direction: column; position: relative; overflow: hidden; }
        
        .prob-area { flex: 0 0 28%; justify-content: flex-start; }
        .hint-area { flex: 1; min-height: 0; }

        .label-box { display: inline-block; background: #EEF3FF; color: var(--gemini-blue); padding: 6px 15px; border-radius: 8px; font-weight: 800; font-size: 1.1rem; margin-bottom: 10px; border: 1px solid #D2E3FC; width: fit-content; flex-shrink: 0; }

        .math-container { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; padding: 0 10px; }
        .math-main { font-size: clamp(1.8rem, 3vw, 3.2rem) !important; font-weight: 900; color: #000000 !important; margin: 0; line-height: 1.2; text-align: center; }
        
        .placeholder-text { display: flex; align-items: center; gap: 10px; font-size: 1.3rem; color: #9AA0A6; font-weight: 600; justify-content: center; flex-wrap: wrap; }
        .trigger-btn { background: var(--gemini-blue); color: white; padding: 8px 14px; border-radius: 8px; font-weight: 700; font-size: 1rem; display: inline-block; }

        .hint-label { display: inline-block; padding: 4px 12px; border-radius: 6px; background: var(--gradient); color: white; font-weight: 700; font-size: 0.9rem; margin-bottom: 5px; }
        .hint-item { padding: 15px; border-radius: 12px; background: #F8F9FA; border: 1px solid #E9ECEF; display: none; animation: fadeIn 0.4s ease; margin-bottom: 10px; }
        .hint-text { font-size: 1.2rem; color: #3C4043; line-height: 1.5; font-weight: 500; }

        .ai-area { flex: 1; border: 2px solid #D2E3FC; height: 100%; }

        .ai-loading-container { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100%; gap: 20px; }
        .loader-wrapper { position: relative; width: 140px; height: 140px; display: flex; align-items: center; justify-content: center; }
        .c-ring { 
            position: absolute; width: 100%; height: 100%; border-radius: 50%;
            border: 8px solid rgba(66, 133, 244, 0.1); border-top: 8px solid #4285F4;
            border-right: 8px solid #9B72CB; border-bottom: 8px solid #D96570;
            border-left: 8px solid transparent; animation: spin 1s linear infinite;
        }
        .diamond-img { width: 70px; height: 70px; z-index: 2; animation: pulse 2s infinite ease-in-out; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .loading-ment { font-size: 2rem; font-weight: 800; color: var(--gemini-blue); text-align: center; }

        .sol-content { display: none; flex-direction: column; height: 100%; overflow: hidden; padding-top: 10px; }
        .synth-table { margin: 10px auto; border-collapse: collapse; font-size: 1.6rem; }
        .synth-table td { padding: 6px 18px; text-align: center; }
        .synth-border-left { border-left: 3px solid #5F6368; }
        .synth-border-bottom { border-bottom: 3px solid #5F6368; }
        .remainder { color: #D93025; font-weight: bold; border: 2px solid #FAD2CF; border-radius: 8px; }

        .final-ans { background: #E8F0FE; padding: 15px; border-radius: 12px; font-size: 1.8rem; font-weight: 900; color: #1967D2; text-align: center; margin-top: auto; border: 1px solid #D2E3FC; flex-shrink: 0; }

        .controls { display: grid; grid-template-columns: repeat(6, 1fr); gap: 6px; background: #202124; padding: 10px; border-radius: 15px; flex-shrink: 0; }
        .ctrl-btn { padding: 8px 5px; font-size: 0.85rem; font-weight: 700; border-radius: 8px; border: none; cursor: pointer; transition: 0.2s; white-space: nowrap; }
        .btn-blue { background: var(--gemini-blue); color: white; }
        .btn-gray { background: #5F6368; color: white; }
        .btn-green { background: #34A853; color: white; }
        .ctrl-btn:hover:not(:disabled) { transform: translateY(-2px); filter: brightness(1.1); }
    </style>
</head>
<body>

<svg style="display:none;">
    <symbol id="gemini-diamond" viewBox="0 0 24 24">
        <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="url(#grad1)"/>
        <defs>
            <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" style="stop-color:#4285F4;stop-opacity:1" />
                <stop offset="50%" style="stop-color:#9B72CB;stop-opacity:1" />
                <stop offset="100%" style="stop-color:#D96570;stop-opacity:1" />
            </linearGradient>
        </defs>
    </symbol>
</svg>

<div id="intro-view" class="view-section view-active">
    <div class="intro-container">
        <div class="title-wrapper">
            <img src="gemini-color.png" class="intro-logo" alt="Gemini Logo">
            <span class="intro-title-brand">Gemini</span>
        </div>
        <h1 class="intro-title-main">AI 협업 수학 시뮬레이터</h1>
        <div class="intro-subtitle">2022 개정 수학과 교육과정</div>

        <div class="grade-group">
            <button class="grade-btn" onclick="selectGrade('g1', this)">고1 공통수학</button>
            <button class="grade-btn" onclick="selectGrade('g2', this)">고2 대수/미적분I</button>
            <button class="grade-btn" onclick="selectGrade('g3', this)">고3 미적분II/기하</button>
        </div>

        <div class="chapter-group-wrapper" id="chapter-wrapper">
            <svg id="tree-svg"></svg>
            <div id="chapter-container" class="chapter-group"></div>
        </div>

        <button id="start-app-btn" class="start-btn" disabled onclick="initSimulator()">시뮬레이터 시작하기</button>

        <div class="author-footer">
            수학교육과 20200522<br>이상진
        </div>
    </div>
</div>

<div id="main-view" class="view-section">
    <button id="hidden-reset" onclick="resetDatabase()" title="초기화"></button>

    <div class="header">
        <div class="header-left">
            <img src="gemini-color.png" width="40" height="40" alt="logo">
            <span class="gemini-text">Gemini</span>
            <span class="separator">|</span>
            <span class="sub-text">AI 협업 수학 시뮬레이터 : 조립제법</span>
        </div>
        <div class="header-right">
            <div class="timer-container">
                <div id="timer">05:00</div>
            </div>
        </div>
    </div>

    <div class="container">
        <div class="left-col">
            <div class="section-card prob-area">
                <div class="label-box">탐구 과제 : 조립제법을 이용한 고차방정식의 해 구하기</div>
                <div id="prob-loading" style="display:none; flex:1; align-items:center; justify-content:center; flex-direction:column;">
                    <div class="loader-wrapper" style="width:40px; height:40px;">
                        <div class="c-ring" style="border-width:4px;"></div>
                    </div>
                </div>
                <div class="math-container">
                    <div id="math-display" class="placeholder-text">
                        하단의 <span class="trigger-btn">🎲 문제 생성</span> 버튼을 클릭하세요.
                    </div>
                </div>
            </div>

            <div class="section-card hint-area">
                <div class="label-box">AI Scaffolding</div>
                <div id="hint-1" class="hint-item">
                    <div class="hint-label">Step 1: 인수정리</div>
                    <div class="hint-text" id="h1-text"></div>
                </div>
                <div id="hint-2" class="hint-item">
                    <div class="hint-label">Step 2: 조립제법 도구</div>
                    <div class="hint-text" id="h2-text"></div>
                </div>
            </div>

            <div class="controls">
                <button class="ctrl-btn btn-blue" id="gen-btn" onclick="fetchProblemData()">🎲 문제 생성</button>
                <button class="ctrl-btn btn-gray" id="timer-btn" onclick="toggleTimer()">⏳ 타이머</button>
                <button class="ctrl-btn btn-gray" id="h1-btn" onclick="revealScaffolding(1)" disabled>💡 힌트 1</button>
                <button class="ctrl-btn btn-gray" id="h2-btn" onclick="revealScaffolding(2)" disabled>💡 힌트 2</button>
                <button class="ctrl-btn btn-blue" id="solve-btn" onclick="processAIAnalysis()" disabled>✨ AI 풀이</button>
                <button class="ctrl-btn btn-green" id="next-btn" onclick="resetWorkspace()">⮕ 다음문제</button>
            </div>
        </div>

        <div class="right-col">
            <div class="section-card ai-area">
                <div style="display: flex; align-items: center; justify-content: center; position: relative; margin-bottom: 10px;">
                    <div class="label-box" style="margin: 0;">AI 풀이 결과</div>
                    <span id="ai-sol-label" style="position: absolute; left: 0; color:var(--gemini-blue); font-weight:800; font-size:1.1rem; display:none;">
                        상세 사고 과정 분석
                    </span>
                </div>
                
                <div id="ai-loading" class="ai-loading-container">
                    <div class="loader-wrapper">
                        <div class="c-ring"></div>
                        <img src="gemini-color.png" class="diamond-img" alt="gemini">
                    </div>
                    <div id="ai-ment" class="loading-ment">수학적 구조 분석 중...</div>
                </div>

                <div id="sol-view" class="sol-content">
                    <div id="sol-stream" style="font-size:1.15rem; line-height:1.7; padding: 0 10px;"></div>
                    <div id="sol-footer" class="final-ans" style="display:none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    /* --- Intro Logic --- */
    const curriculumData = {
        'g1': ["다항식", "방정식과 부등식", "도형의 방정식", "집합과 명제", "함수와 그래프"],
        'g2': ["지수함수와 로그함수", "삼각함수", "수열", "함수의 극한과 연속", "미분과 적분"],
        'g3': ["경우의 수와 확률", "통계", "이차곡선", "공간도형과 공간좌표"]
    };

    let selectedGrade = null;
    let selectedChapter = null;

    function selectGrade(gradeKey, btnElement) {
        document.querySelectorAll('.grade-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        selectedGrade = gradeKey;
        selectedChapter = null;
        updateStartButton();

        const container = document.getElementById('chapter-container');
        container.innerHTML = '';
        
        curriculumData[gradeKey].forEach(chapter => {
            const btn = document.createElement('button');
            btn.className = 'chapter-btn';
            btn.innerText = chapter;
            btn.onclick = () => selectChapter(chapter, btn);
            container.appendChild(btn);
        });

        requestAnimationFrame(() => drawTreeLine(btnElement));
        window.addEventListener('resize', () => drawTreeLine(btnElement), { once: true });
    }

    function selectChapter(chapterName, btnElement) {
        document.querySelectorAll('.chapter-btn').forEach(btn => btn.classList.remove('active'));
        btnElement.classList.add('active');
        selectedChapter = chapterName;
        updateStartButton();
    }

    function updateStartButton() {
        const startBtn = document.getElementById('start-app-btn');
        startBtn.disabled = !(selectedGrade && selectedChapter);
    }

    function drawTreeLine(activeGradeBtn) {
        const svg = document.getElementById('tree-svg');
        const chapters = document.querySelectorAll('.chapter-btn');
        
        if (!activeGradeBtn || chapters.length === 0) {
            svg.style.display = 'none';
            return;
        }
        
        svg.style.display = 'block';
        svg.innerHTML = '';
        const svgRect = svg.getBoundingClientRect();
        const gradeRect = activeGradeBtn.getBoundingClientRect();
        
        const startX = gradeRect.left + gradeRect.width / 2 - svgRect.left;
        const firstRect = chapters[0].getBoundingClientRect();
        const lastRect = chapters[chapters.length - 1].getBoundingClientRect();
        
        const minX = firstRect.left + firstRect.width / 2 - svgRect.left;
        const maxX = lastRect.left + lastRect.width / 2 - svgRect.left;
        
        const lineMinX = Math.min(minX, startX);
        const lineMaxX = Math.max(maxX, startX);
        
        let pathData = `M ${startX} 0 L ${startX} 15 M ${lineMinX} 15 L ${lineMaxX} 15 `;
        
        chapters.forEach(ch => {
            const r = ch.getBoundingClientRect();
            const cx = r.left + r.width / 2 - svgRect.left;
            pathData += `M ${cx} 15 L ${cx} 30 `;
        });
        
        const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        path.setAttribute('d', pathData);
        path.setAttribute('stroke', '#1A73E8');
        path.setAttribute('stroke-width', '2');
        path.setAttribute('fill', 'none');
        svg.appendChild(path);
    }

    function initSimulator() {
        document.getElementById('intro-view').classList.remove('view-active');
        document.getElementById('main-view').classList.add('view-active');
        renderMath();
    }

    /* --- Simulator Logic --- */
    const problemDatabase = [
        { id: 1, q: "2x^3 - x^2 - 8x + 4 = 0", h1: "최고차항 계수 2와 상수항 4의 약수 비를 이용하여 식을 0으로 만드는 $x$를 탐색하세요.", h2: "$x=2$ 대입 시 성립합니다. 2를 제수로 조립제법을 실행하세요.", k: 2, coeffs: [2, -1, -8, 4], mid: ["", 4, 6, -4], res: [2, 3, -2, 0], factor: "(2x^2 + 3x - 2)", factorFinal: "(2x-1)(x+2)", ans: "x = 2, -2, \\frac{1}{2}" },
        { id: 2, q: "3x^3 - 4x^2 - 17x + 6 = 0", h1: "상수항 6의 약수를 3의 약수로 나눈 값 중 하나를 대입해 인수정리를 만족하는 해를 찾습니다.", h2: "$x=3$을 대입하면 0이 됩니다. 계수 배열을 3으로 연산하세요.", k: 3, coeffs: [3, -4, -17, 6], mid: ["", 9, 15, -6], res: [3, 5, -2, 0], factor: "(3x^2 + 5x - 2)", factorFinal: "(3x-1)(x+2)", ans: "x = 3, -2, \\frac{1}{3}" },
        { id: 3, q: "2x^3 + 3x^2 - 11x - 6 = 0", h1: "최고차항 2와 상수항 -6의 약수를 활용하여 $P(x)=0$이 되는 $x$를 도출하세요.", h2: "$x=2$를 기준으로 계수 행렬 조립제법을 수행하여 이차식을 분리하세요.", k: 2, coeffs: [2, 3, -11, -6], mid: ["", 4, 14, 6], res: [2, 7, 3, 0], factor: "(2x^2 + 7x + 3)", factorFinal: "(2x+1)(x+3)", ans: "x = 2, -3, -\\frac{1}{2}" },
        { id: 4, q: "4x^3 - 12x^2 + 5x + 6 = 0", h1: "인수정리를 적용하기 위해 상수항 6의 약수 중 대입하여 0이 되는 값을 확인합니다.", h2: "$x=2$일 때 식이 성립합니다. 2를 조립제법의 기준값으로 설정하세요.", k: 2, coeffs: [4, -12, 5, 6], mid: ["", 8, -8, -6], res: [4, -4, -3, 0], factor: "(4x^2 - 4x - 3)", factorFinal: "(2x-3)(2x+1)", ans: "x = 2, \\frac{3}{2}, -\\frac{1}{2}" },
        { id: 5, q: "2x^3 + 5x^2 - 14x - 8 = 0", h1: "최고차항과 상수항의 약수 조합으로 식을 만족하는 $x$를 탐색합니다.", h2: "$x=2$에서 0이 됩니다. 인수 $(x-2)$를 분리하기 위한 조립제법을 시작하세요.", k: 2, coeffs: [2, 5, -14, -8], mid: ["", 4, 18, 8], res: [2, 9, 4, 0], factor: "(2x^2 + 9x + 4)", factorFinal: "(2x+1)(x+4)", ans: "x = 2, -4, -\\frac{1}{2}" },

    let problemHistory = new Set();
    let activeProblem = null;
    let activePreviousProblem = null;
    let timerInstance = null;
    let timeRemaining = 300;

    function renderMath() {
        renderMathInElement(document.body, {
            delimiters: [{left: "$$", right: "$$", display: true}, {left: "$", right: "$", display: false}],
            throwOnError: false
        });
    }

    function resetDatabase() {
        problemHistory.clear();
        activePreviousProblem = null;
        resetWorkspace();
    }

    function fetchProblemData() {
        const displayArea = document.getElementById('math-display');
        const loaderArea = document.getElementById('prob-loading');
        loaderArea.style.display = 'flex'; displayArea.style.display = 'none';
        
        setTimeout(() => {
            let availableData = problemDatabase.filter(p => !problemHistory.has(p.id));
            
            if (availableData.length === 0) {
                activeProblem = activePreviousProblem ? activePreviousProblem : problemDatabase[problemDatabase.length - 1];
            } else {
                activeProblem = availableData[Math.floor(Math.random() * availableData.length)];
                problemHistory.add(activeProblem.id);
                activePreviousProblem = activeProblem;
            }

            loaderArea.style.display = 'none'; displayArea.style.display = 'flex';
            displayArea.className = "math-main";
            displayArea.innerText = "$$" + activeProblem.q + "$$";
            document.getElementById('h1-text').innerText = activeProblem.h1;
            document.getElementById('h2-text').innerText = activeProblem.h2;
            
            document.getElementById('h1-btn').disabled = false;
            document.getElementById('h2-btn').disabled = false;
            document.getElementById('solve-btn').disabled = false;
            renderMath();
        }, 4500);
    }

    function toggleTimer() {
        if (timerInstance) {
            clearInterval(timerInstance); timerInstance = null;
            document.getElementById('timer-btn').innerText = "⏳ 재개";
        } else {
            document.getElementById('timer-btn').innerText = "⏹️ 중지";
            timerInstance = setInterval(() => {
                timeRemaining--; updateTimerUI();
                if (timeRemaining <= 0) clearInterval(timerInstance);
            }, 1000);
        }
    }

    function updateTimerUI() {
        const min = Math.floor(timeRemaining / 60); const sec = timeRemaining % 60;
        const el = document.getElementById('timer');
        el.innerText = `${String(min).padStart(2, '0')}:${String(sec).padStart(2, '0')}`;
        if (timeRemaining < 60) el.style.color = "#D93025";
    }

    function revealScaffolding(n) { document.getElementById(`hint-${n}`).style.display = 'block'; }

    function processAIAnalysis() {
        clearInterval(timerInstance);
        document.getElementById('sol-view').style.display = 'none';
        document.getElementById('ai-sol-label').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'flex';
        
        const processSteps = ["방정식 차수 분석 중...", "계수 추출 및 행렬 구성 중...", "조립제법 알고리즘 연산 중..."];
        let stepIdx = 0;
        const processTimer = setInterval(() => {
            document.getElementById('ai-ment').innerText = processSteps[stepIdx % 3];
            stepIdx++;
        }, 2000);

        setTimeout(() => {
            clearInterval(processTimer);
            document.getElementById('ai-loading').style.display = 'none';
            document.getElementById('ai-sol-label').style.display = 'block';
            document.getElementById('sol-view').style.display = 'flex';
            renderAIResponse();
        }, 7000);
    }

    function renderAIResponse() {
        const target = document.getElementById('sol-stream');
        const footer = document.getElementById('sol-footer');
        target.innerHTML = ""; footer.style.display = "none";

        const tableHTML = `
            <div style="margin: 10px 0; display:flex; justify-content:center;">
                <table class="synth-table">
                    <tr>
                        <td style="color:var(--gemini-blue); font-weight:bold;">${activeProblem.k}</td>
                        <td class="synth-border-left">${activeProblem.coeffs[0]}</td>
                        <td>${activeProblem.coeffs[1]}</td>
                        <td>${activeProblem.coeffs[2]}</td>
                        <td>${activeProblem.coeffs[3]}</td>
                    </tr>
                    <tr><td></td><td class="synth-border-left"></td><td style="color:#8E75FF;">${activeProblem.mid[1]}</td><td style="color:#8E75FF;">${activeProblem.mid[2]}</td><td style="color:#8E75FF;">${activeProblem.mid[3]}</td></tr>
                    <tr class="synth-border-bottom"><td colspan="5" style="height:0; padding:0;"></td></tr>
                    <tr><td></td><td>${activeProblem.res[0]}</td><td>${activeProblem.res[1]}</td><td>${activeProblem.res[2]}</td><td class="remainder">${activeProblem.res[3]}</td></tr>
                </table>
            </div>
        `;

        const signK = activeProblem.k < 0 ? '+' : '-';
        const absK = Math.abs(activeProblem.k);
        const factorStr = `(x ${signK} ${absK})`;

        const analysisData = [
            `<b>1. 인수정리:</b> $P(${activeProblem.k}) = 0$이므로 $${factorStr}$를 인수로 추출합니다.`,
            `<b>2. 조립제법 실행:</b> 계수 배열 $[${activeProblem.coeffs.join(', ')}]$을 사용하여 연산합니다.`,
            tableHTML,
            `<b>3. 1차 분해 결과:</b> 조립제법을 통해 다항식을 다음과 같이 분해합니다. <br> &nbsp;&nbsp; $\\Rightarrow ${factorStr}$$${activeProblem.factor} = 0$`,
            `<b>4. 2차 분해 결과:</b> 몫으로 도출된 이차식을 추가로 인수분해합니다. <br> &nbsp;&nbsp; $\\Rightarrow ${factorStr}$$${activeProblem.factorFinal} = 0$`,
            `<b>5. 근의 도출:</b> 방정식의 모든 실근 및 중근을 산출합니다.`
        ];

        let index = 0;
        function renderStep() {
            if (index < analysisData.length) {
                const div = document.createElement('div');
                div.style.marginBottom = "10px"; div.style.opacity = "0";
                div.innerHTML = analysisData[index];
                target.appendChild(div);
                setTimeout(() => { div.style.transition = "opacity 0.6s"; div.style.opacity = "1"; renderMath(); }, 50);
                index++;
                setTimeout(renderStep, 1000);
            } else {
                footer.style.display = "block";
                footer.innerHTML = "정답 : $ " + activeProblem.ans + " $";
                renderMath();
            }
        }
        renderStep();
    }

    function resetWorkspace() {
        const mathDisplay = document.getElementById('math-display');
        mathDisplay.innerHTML = "하단의 <span class='trigger-btn'>🎲 문제 생성</span> 버튼을 클릭하세요.";
        mathDisplay.className = "placeholder-text";
        document.getElementById('hint-1').style.display = 'none';
        document.getElementById('hint-2').style.display = 'none';
        document.getElementById('sol-view').style.display = 'none';
        document.getElementById('ai-sol-label').style.display = 'none';
        document.getElementById('ai-loading').style.display = 'none';
        document.getElementById('h1-btn').disabled = true;
        document.getElementById('h2-btn').disabled = true;
        document.getElementById('solve-btn').disabled = true;
        timeRemaining = 300; updateTimerUI();
        if(timerInstance) { clearInterval(timerInstance); timerInstance = null; }
        document.getElementById('timer-btn').innerText = "⏳ 타이머";
    }

    window.onload = renderMath;
</script>
